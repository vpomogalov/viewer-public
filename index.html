<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VPomogalov — Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, sans-serif;
            color: rgba(255,255,255,0.45);
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .loader-dot {
            width: 6px;
            height: 6px;
            background: #1f6feb;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .loader-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-dot"></div>
        <div class="loader-text">Загрузка...</div>
    </div>
    <iframe id="viewer" allow="autoplay; fullscreen"></iframe>

    <script>
        const FUNCTION_URL = 'https://functions.yandexcloud.net/d4ep9alf1c3aib33er4h';
        const loader = document.getElementById('loader');
        const iframe = document.getElementById('viewer');

        async function init() {
            try {
                const resp = await fetch(`${FUNCTION_URL}?file=player.html`);
                if (!resp.ok) throw new Error('Ошибка загрузки плеера');
                const html = await resp.text();
                
                const blob = new Blob([html], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                
                iframe.src = blobUrl;
                iframe.style.display = 'block';
                loader.style.display = 'none';
            } catch (err) {
                loader.innerHTML = '<div class="loader-text" style="color:#ff5555;">Ошибка загрузки</div>';
                console.error(err);
            }
        }

        init();
    </script>
</body>
</html>
